<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Chunking Strategies </title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0f14;
    --bg2: #13161e;
    --bg3: #1a1e28;
    --bg4: #222636;
    --border: #2a2f40;
    --border2: #363c52;
    --text: #e8eaf0;
    --muted: #7a8299;
    --accent: #6c8fff;
    --accent2: #a78bfa;
    --green: #34d399;
    --amber: #fbbf24;
    --coral: #f87171;
    --teal: #22d3ee;
    --pink: #f472b6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    height: 100vh;
  }

  /* Sidebar */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid var(--border);
  }
  .sidebar-header h1 {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: .08em;
    text-transform: uppercase;
  }
  .sidebar-header p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    cursor: pointer;
    border-left: 2px solid transparent;
    transition: all .15s;
    font-size: 12.5px;
    color: var(--muted);
  }
  .nav-item:hover { background: var(--bg3); color: var(--text); }
  .nav-item.active {
    border-left-color: var(--accent);
    background: var(--bg3);
    color: var(--text);
  }
  .nav-num {
    font-size: 10px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent);
    font-weight: 500;
    min-width: 18px;
  }
  .nav-badge {
    margin-left: auto;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 500;
    letter-spacing: .04em;
  }
  .badge-easy { background: rgba(52,211,153,.12); color: var(--green); }
  .badge-med  { background: rgba(251,191,36,.12);  color: var(--amber); }
  .badge-hard { background: rgba(248,113,113,.12);  color: var(--coral); }

  /* Main content */
  #main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }
  .content-area {
    padding: 32px 40px;
    max-width: 880px;
    width: 100%;
  }

  /* Strategy header */
  .strategy-header {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    margin-bottom: 28px;
  }
  .strategy-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .strategy-title { font-size: 22px; font-weight: 600; line-height: 1.2; }
  .strategy-subtitle { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.5; }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }
  .tab-btn {
    padding: 9px 18px;
    font-size: 13px;
    font-family: 'Sora', sans-serif;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all .15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* Theory sections */
  .section-block {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    margin-bottom: 14px;
  }
  .section-block h3 {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .section-block p, .section-block li {
    font-size: 13.5px;
    line-height: 1.75;
    color: #c8ccd8;
  }
  .section-block ul { padding-left: 18px; }
  .section-block li { margin-bottom: 4px; }

  .info-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 14px;
  }
  .info-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }
  .info-card-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .07em;
    color: var(--muted);
    margin-bottom: 6px;
    font-weight: 500;
  }
  .info-card-val {
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 500;
    margin: 2px 3px 2px 0;
  }
  .pill-green { background: rgba(52,211,153,.1); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
  .pill-red   { background: rgba(248,113,113,.1); color: var(--coral); border: 1px solid rgba(248,113,113,.2); }
  .pill-amber { background: rgba(251,191,36,.1);  color: var(--amber); border: 1px solid rgba(251,191,36,.2); }
  .pill-blue  { background: rgba(108,143,255,.1); color: var(--accent); border: 1px solid rgba(108,143,255,.2); }
  .pill-teal  { background: rgba(34,211,238,.1);  color: var(--teal); border: 1px solid rgba(34,211,238,.2); }

  /* Visual diagram */
  .visual-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    margin-bottom: 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    overflow-x: auto;
  }
  .chunk-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
    align-items: center;
  }
  .chunk-label {
    font-size: 10px;
    color: var(--muted);
    min-width: 60px;
  }
  .chunk-block {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11.5px;
    line-height: 1.4;
  }
  .chunk-blue   { background: rgba(108,143,255,.15); color: #a5bfff; border: 1px solid rgba(108,143,255,.25); }
  .chunk-green  { background: rgba(52,211,153,.12);  color: #6ee7b7; border: 1px solid rgba(52,211,153,.2); }
  .chunk-amber  { background: rgba(251,191,36,.12);  color: #fcd34d; border: 1px solid rgba(251,191,36,.2); }
  .chunk-purple { background: rgba(167,139,250,.12); color: #c4b5fd; border: 1px solid rgba(167,139,250,.2); }
  .chunk-coral  { background: rgba(248,113,113,.12); color: #fca5a5; border: 1px solid rgba(248,113,113,.2); }
  .chunk-teal   { background: rgba(34,211,238,.12);  color: #67e8f9; border: 1px solid rgba(34,211,238,.2); }
  .overlap-indicator {
    font-size: 10px;
    color: var(--amber);
    background: rgba(251,191,36,.08);
    border: 1px dashed rgba(251,191,36,.3);
    padding: 2px 6px;
    border-radius: 4px;
  }
  .arrow { color: var(--muted); font-size: 13px; }

  /* Code block */
  .code-wrap {
    background: #0a0c10;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    margin-bottom: 16px;
  }
  .code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
  }
  .code-title {
    font-size: 11px;
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .04em;
  }
  .copy-btn {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 5px;
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--muted);
    cursor: pointer;
    font-family: 'Sora', sans-serif;
    transition: all .15s;
  }
  .copy-btn:hover { color: var(--text); border-color: var(--accent); }
  pre {
    margin: 0;
    padding: 18px 20px;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    line-height: 1.75;
    tab-size: 4;
  }
  /* Syntax highlighting */
  .kw { color: #c792ea; }
  .fn { color: #82aaff; }
  .str { color: #c3e88d; }
  .cm { color: #546e7a; font-style: italic; }
  .num { color: #f78c6c; }
  .cls { color: #ffcb6b; }
  .var { color: #e8eaf0; }
  .op  { color: #89ddff; }

  /* Nav controls */
  .nav-controls {
    display: flex;
    gap: 10px;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    padding: 9px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
    transition: all .15s;
    font-weight: 500;
  }
  .nav-btn-prev {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .nav-btn-prev:hover { color: var(--text); border-color: var(--border2); }
  .nav-btn-next {
    background: var(--accent);
    border: 1px solid var(--accent);
    color: #fff;
  }
  .nav-btn-next:hover { opacity: .88; }
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 16px 14px;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width .3s ease;
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
  .note-box {
    background: rgba(108,143,255,.06);
    border: 1px solid rgba(108,143,255,.2);
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    font-size: 13px;
    color: #b0bce0;
    line-height: 1.65;
    margin-bottom: 14px;
  }
  .warn-box {
    background: rgba(251,191,36,.06);
    border: 1px solid rgba(251,191,36,.2);
    border-left: 3px solid var(--amber);
    border-radius: 0 8px 8px 0;
    padding: 12px 16px;
    font-size: 13px;
    color: #e0d0a0;
    line-height: 1.65;
    margin-bottom: 14px;
  }
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-header">
    <h1>RAG Chunking</h1>
    <p>10 Strategies · Theory + Code</p>
  </div>
  <div id="progress-bar-wrap">
    <div style="height:14px"></div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:10%"></div></div>
  </div>
  <div id="navList"></div>
</div>

<div id="main">
  <div class="content-area" id="contentArea"></div>
</div>

<script>
const strategies = [
  {
    num: "01",
    name: "Fixed-Size Chunking",
    icon: "📦",
    iconBg: "rgba(108,143,255,.15)",
    badge: "easy",
    tagline: "Split text into equal-sized blocks, ignoring content boundaries",
    when: "When you need speed and simplicity above all else — great as a baseline.",
    notWhen: "When chunks must carry complete thoughts or the document has rich structure.",
    cost: "Very Low",
    quality: "Low",
    useCases: ["Baseline experiments", "Very large homogeneous text corpora", "Quick prototyping"],
    pros: ["Extremely fast", "Predictable chunk sizes", "No NLP libraries needed", "Easy to tune"],
    cons: ["Ignores semantic boundaries", "Can cut sentences mid-way", "Loses context at edges"],
    visual: `
      <div style="color:var(--muted);font-size:11px;margin-bottom:10px;">Input text → Fixed 512-token blocks with 50-token overlap</div>
      <div class="chunk-row">
        <span class="chunk-label">Chunk 1</span>
        <span class="chunk-block chunk-blue">Token 1 … Token 512</span>
      </div>
      <div class="chunk-row">
        <span class="chunk-label">Chunk 2</span>
        <span class="chunk-block chunk-amber" style="opacity:.5;font-size:10px;">← overlap (462–512)</span>
        <span class="chunk-block chunk-blue">Token 462 … Token 974</span>
      </div>
      <div class="chunk-row">
        <span class="chunk-label">Chunk 3</span>
        <span class="chunk-block chunk-amber" style="opacity:.5;font-size:10px;">← overlap</span>
        <span class="chunk-block chunk-blue">Token 924 … 1436</span>
      </div>
      <div style="margin-top:12px;font-size:11px;color:var(--amber);">⚠ Sentences can be cut mid-way at chunk boundaries</div>
    `,
    theory: `
      <div class="section-block">
        <h3>How It Works</h3>
        <p>Fixed-size chunking divides a document into chunks of a predetermined number of tokens (or characters). An <strong>overlap</strong> parameter controls how many tokens from the end of one chunk are repeated at the start of the next — this prevents losing context right at chunk boundaries.</p>
        <p style="margin-top:10px;">The formula: if chunk_size = 512 and overlap = 50, chunk N spans tokens [N×(512−50) : N×(512−50)+512].</p>
      </div>
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-label">Key Parameters</div>
          <div class="info-card-val">
            <span class="pill pill-blue">chunk_size</span>
            <span class="pill pill-blue">overlap</span>
          </div>
        </div>
        <div class="info-card">
          <div class="info-card-label">Units</div>
          <div class="info-card-val">Characters <em>or</em> Tokens (via tiktoken)</div>
        </div>
      </div>
      <div class="note-box">💡 Overlap is critical — without it, a sentence that spans a chunk boundary would be split across two chunks, making retrieval of that fact nearly impossible.</div>
      <div class="section-block">
        <h3>Pros</h3>
        <ul>${["Blazing fast — O(n) with no NLP", "Completely deterministic", "Works on any text in any language", "Easy to tune chunk_size for your embedding model"].map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
      <div class="section-block">
        <h3>Cons</h3>
        <ul>${["Mid-sentence cuts degrade retrieval quality", "Ignores semantic meaning entirely", "Overlap increases storage by ~10–20%", "Poor on structured documents (tables, code)"].map(x=>`<li>${x}</li>`).join('')}</ul>
      </div>
    `,
    code: `<span class="kw">from</span> <span class="var">typing</span> <span class="kw">import</span> <span class="var">List</span>

<span class="kw">def</span> <span class="fn">fixed_size_chunk</span>(
    <span class="var">text</span>: <span class="cls">str</span>,
    <span class="var">chunk_size</span>: <span class="cls">int</span> <span class="op">=</span> <span class="num">512</span>,
    <span class="var">overlap</span>: <span class="cls">int</span> <span class="op">=</span> <span class="num">50</span>
) <span class="op">-></span> <span class="var">List</span>[<span class="cls">str</span>]:
    <span class="str">"""
    Split text into fixed-size character chunks with overlap.
    
    Args:
        text: Input text to chunk
        chunk_size: Max characters per chunk
        overlap: Characters to repeat from previous chunk
    Returns:
        List of text chunks
    """</span>
    <span class="var">chunks</span> <span class="op">=</span> []
    <span class="var">start</span> <span class="op">=</span> <span class="num">0</span>
    <span class="var">step</span> <span class="op">=</span> <span class="var">chunk_size</span> <span class="op">-</span> <span class="var">overlap</span>  <span class="cm"># Stride between chunks</span>

    <span class="kw">while</span> <span class="var">start</span> <span class="op"><</span> <span class="fn">len</span>(<span class="var">text</span>):
        <span class="var">end</span> <span class="op">=</span> <span class="var">start</span> <span class="op">+</span> <span class="var">chunk_size</span>
        <span class="var">chunks</span>.<span class="fn">append</span>(<span class="var">text</span>[<span class="var">start</span>:<span class="var">end</span>])
        <span class="var">start</span> <span class="op">+=</span> <span class="var">step</span>

    <span class="kw">return</span> <span class="var">chunks</span>


<span class="cm"># ─── Token-based version (using tiktoken) ──────────────────────────</span>
<span class="kw">import</span> <span class="var">tiktoken</span>

<span class="kw">def</span> <span class="fn">fixed_token_chunk</span>(
    <span class="var">text</span>: <span class="cls">str</span>,
    <span class="var">chunk_size</span>: <span class="cls">int</span> <span class="op">=</span> <span class="num">512</span>,
    <span class="var">overlap</span>: <span class="cls">int</span> <span class="op">=</span> <span class="num">50</span>,
    <span class="var">model</span>: <span class="cls">str</span> <span class="op">=</span> <span class="str">"cl100k_base"</span>
) <span class="op">-></span> <span class="var">List</span>[<span class="cls">str</span>]:
    <span class="var">enc</span> <span class="op">=</span> <span class="var">tiktoken</span>.<span class="fn">get_encoding</span>(<span class="var">model</span>)
    <span class="var">tokens</span> <span class="op">=</span> <span class="var">enc</span>.<span class="fn">encode</span>(<span class="var">text</span>)
    <span class="var">chunks</span> <span class="op">=</span> []
    <span class="var">step</span> <span class="op">=</span> <span class="var">chunk_size</span> <span class="op">-</span> <span class="var">overlap</span>

    <span class="kw">for</span> <span class="var">i</span> <span class="kw">in</span> <span class="fn">range</span>(<span class="num">0</span>, <span class="fn">len</span>(<span class="var">tokens</span>), <span class="var">step</span>):
        <span class="var">token_chunk</span> <span class="op">=</span> <span class="var">tokens</span>[<span class="var">i</span>:<span class="var">i</span> <span class="op">+</span> <span class="var">chunk_size</span>]
        <span class="var">chunks</span>.<span class="fn">append</span>(<span class="var">enc</span>.<span class="fn">decode</span>(<span class="var">token_chunk</span>))

    <span class="kw">return</span> <span class="var">chunks</span>


<span class="cm"># ─── Usage example ──────────────────────────────────────────────────</span>
<span class="kw">if</span> <span class="var">__name__</span> <span class="op">==</span> <span class="str">"__main__"</span>:
    <span class="var">text</span> <span class="op">=</span> <span class="str">"Artificial intelligence is transforming every industry. "</span> <span class="op">*</span> <span class="num">40</span>
    
    <span class="var">chunks</span> <span class="op">=</span> <span class="fn">fixed_size_chunk</span>(<span class="var">text</span>, <span class="var">chunk_size</span><span class="op">=</span><span class="num">200</span>, <span class="var">overlap</span><span class="op">=</span><span class="num">30</span>)
    <span class="fn">print</span>(<span class="str">f"Total chunks: {len(chunks)}"</span>)
    <span class="fn">print</span>(<span class="str">f"Chunk 1: {chunks[0][:80]}..."</span>)
    <span class="fn">print</span>(<span class="str">f"Chunk 2 starts with: {chunks[1][:30]}..."</span>)  <span class="cm"># Should overlap</span>`
  },
  {
    num: "02",
    name: "Sentence-Based Chunking",
    icon: "📝",
    iconBg: "rgba(52,211,153,.12)",
    badge: "easy",
    tagline: "Respect sentence boundaries — preserve complete thoughts",
    when: "Q&A, factual retrieval, news articles, and any content where individual facts matter.",
    notWhen: "When documents have very long sentences or code blocks.",
    cost: "Low",
    quality: "Medium",
    useCases: ["Factual Q&A", "News/article retrieval", "Legal document search"],
    pros: ["Preserves complete thoughts", "Linguistically meaningful", "Works well for factual retrieval"],
    cons: ["Chunks can be very short", "Expensive NLP on huge corpora", "No paragraph-level context"],
    visual: `
      <div style="color:var(--muted);font-size:11px;margin-bottom:10px;">Each sentence (or group of N sentences) becomes a chunk</div>
      <div style="font-size:12px;color:var(--text);line-height:1.8;margin-bottom:12px;padding:10px;background:var(--bg4);border-radius:6px;">
        <span class="chunk-block chunk-blue" style="display:inline">The cat sat on the mat.</span>
        <span class="chunk-block chunk-green" style="display:inline;margin:0 2px">It looked very comfortable.</span>
        <span class="chunk-block chunk-amber" style="display:inline">The dog watched from the door.</span>
        <span class="chunk-block chunk-purple" style="display:inline;margin:0 2px">Neither animal moved for hours.</span>
      </div>
      <div style="color:var(--muted);font-size:11px;margin-top:8px;">With sentence_group=2, chunks would be pairs of sentences ↗</div>
    `,
    theory: `
      <div class="section-block">
        <h3>How It Works</h3>
        <p>Text is split at sentence boundaries using NLP tools like spaCy or NLTK's sentence tokenizer (Punkt). Rather than chunking individual sentences (which may be too small for good embeddings), you typically group N sentences together into one chunk, optionally with 1–2 sentence overlap between groups.</p>
      </div>
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-label">Key Parameters</div>
          <div class="info-card-val"><span class="pill pill-blue">sentences_per_chunk</span><span class="pill pill-blue">sentence_overlap</span></div>
        </div>
        <div class="info-card">
          <div class="info-card-label">Libraries Needed</div>
          <div class="info-card-val">spaCy, NLTK (punkt), or regex</div>
        </div>
      </div>
      <div class="note-box">💡 Use spaCy over simple regex splitting — spaCy handles abbreviations like "Dr." or "U.S.A." that would confuse a naïve period-split.</div>
      <div class="section-block">

    ) <span class="op">-></span> <span class="var">List</span>[<span class="cls">str</span>]:
        <span class="str">"Post-retrieval: swap child chunks with their parents, deduplicate."</span>
        <span class="var">seen_parents</span> <span class="op">=</span> <span class="fn">set</span>()
        <span class="var">context_chunks</span> <span class="op">=</span> []
        <span class="kw">for</span> <span class="var">child</span> <span class="kw">in</span> <span class="var">retrieved_children</span>:
            <span class="var">pid</span> <span class="op">=</span> <span class="var">child</span>[<span class="str">"parent_id"</span>]
            <span class="kw">if</span> <span class="var">pid</span> <span class="kw">not in</span> <span class="var">seen_parents</span>:
                <span class="var">parent</span> <span class="op">=</span> <span class="var">self</span>.<span class="fn">get_parent</span>(<span class="var">child</span>)
                <span class="kw">if</span> <span class="var">parent</span>:
                    <span class="var">context_chunks</span>.<span class="fn">append</span>(<span class="var">parent</span>[<span class="str">"text"</span>])
                    <span class="var">seen_parents</span>.<span class="fn">add</span>(<span class="var">pid</span>)
        <span class="kw">return</span> <span class="var">context_chunks</span>`
  },
  {
    num: "10",
    name: "Hierarchical Chunking",
    icon: "🏛️",
    iconBg: "rgba(167,139,250,.12)",
    badge: "hard",
    tagline: "Multi-level index from document → section → paragraph → sentence",
    when: "Large complex documents where queries need different levels of detail.",
    notWhen: "Simple, flat documents without meaningful hierarchy.",
    cost: "Medium-High",
    quality: "Very High",
    useCases: ["Books/textbooks", "Legal codebooks", "Enterprise knowledge bases", "Long technical manuals"],
    pros: ["Maximum flexibility", "Enables multi-hop reasoning", "Rich metadata at every level", "Supports summary-based search"],
    cons: ["Complex implementation", "Larger vector DB", "Query routing logic needed"],
    visual: `
      <div style="color:var(--muted);font-size:11px;margin-bottom:10px;">Multi-level index — query at right granularity automatically</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:11px;line-height:2;">
        <div><span class="chunk-block chunk-coral" style="display:inline">📘 Document</span> → summary chunk</div>
        <div style="padding-left:20px"><span class="chunk-block chunk-purple" style="display:inline">📑 Section 1</span> → section chunk</div>
        <div style="padding-left:40px"><span class="chunk-block chunk-blue" style="display:inline">📄 Para 1.1</span><span class="chunk-block chunk-blue" style="display:inline;margin-left:4px">📄 Para 1.2</span></div>
        <div style="padding-left:60px"><span class="chunk-block chunk-green" style="display:inline">S1</span><span class="chunk-block chunk-green" style="display:inline;margin-left:2px">S2</span><span class="chunk-block chunk-green" style="display:inline;margin-left:2px">S3</span></div>
        <div style="padding-left:20px"><span class="chunk-block chunk-purple" style="display:inline">📑 Section 2</span></div>
        <div style="padding-left:40px"><span class="chunk-block chunk-blue" style="display:inline">📄 Para 2.1</span></div>
      </div>
    `,
    theory: `
      <div class="section-block">
        <h3>How It Works</h3>
        <p>Multiple levels of chunks are created from the same document, stored in a vector database with level metadata. At query time, a routing layer (often another LLM call or heuristic) decides which level to query:</p>
        <ul style="margin-top:8px">
          <li><strong>Broad questions</strong> ("What is this book about?") → query document/section summaries</li>
          <li><strong>Specific questions</strong> ("What formula is on page 42?") → query paragraph/sentence chunks</li>
        </ul>
      </div>
      <div class="note-box">💡 Each chunk at every level can store a "summary" of its children — enabling both exact retrieval and high-level navigation of the document structure.</div>
      <div class="section-block">
        <h3>RAPTOR: Advanced Hierarchical Retrieval</h3>
        <p>RAPTOR (Recursive Abstractive Processing for Tree-Organized Retrieval) takes this further: it uses an LLM to generate summaries at each level, clustering similar leaf nodes together. This enables retrieval of implicit themes that wouldn't appear in any individual chunk.</p>
      </div>
    `,
    code: `<span class="kw">from</span> <span class="var">typing</span> <span class="kw">import</span> <span class="var">List</span>, <span class="var">Dict</span>, <span class="var">Optional</span>
<span class="kw">from</span> <span class="var">dataclasses</span> <span class="kw">import</span> <span class="var">dataclass</span>, <span class="var">field</span>
<span class="kw">import</span> <span class="var">re</span>
<span class="kw">import</span> <span class="var">uuid</span>

<span class="kw">@dataclass</span>
<span class="kw">class</span> <span class="cls">HierarchicalChunk</span>:
    <span class="var">id</span>: <span class="cls">str</span>
    <span class="var">text</span>: <span class="cls">str</span>
    <span class="var">level</span>: <span class="cls">int</span>          <span class="cm"># 0=doc, 1=section, 2=paragraph, 3=sentence</span>
    <span class="var">parent_id</span>: <span class="var">Optional</span>[<span class="cls">str</span>]
    <span class="var">children_ids</span>: <span class="var">List</span>[<span class="cls">str</span>] <span class="op">=</span> <span class="var">field</span>(<span class="var">default_factory</span><span class="op">=</span><span class="cls">list</span>)
    <span class="var">metadata</span>: <span class="var">Dict</span> <span class="op">=</span> <span class="var">field</span>(<span class="var">default_factory</span><span class="op">=</span><span class="cls">dict</span>)
    <span class="var">summary</span>: <span class="var">Optional</span>[<span class="cls">str</span>] <span class="op">=</span> <span class="kw">None</span>  <span class="cm"># LLM-generated summary of children</span>

<span class="kw">class</span> <span class="cls">HierarchicalChunker</span>:
    <span class="str">"""
    Builds a full document tree with chunks at every level.
    Supports markdown documents with H1/H2/H3 hierarchy.
    """</span>
    <span class="kw">def</span> <span class="fn">__init__</span>(<span class="var">self</span>, <span class="var">sentence_min_len</span>: <span class="cls">int</span> <span class="op">=</span> <span class="num">20</span>):
        <span class="var">self</span>.<span class="var">sentence_min_len</span> <span class="op">=</span> <span class="var">sentence_min_len</span>
        <span class="var">self</span>.<span class="var">store</span>: <span class="var">Dict</span>[<span class="cls">str</span>, <span class="cls">HierarchicalChunk</span>] <span class="op">=</span> {}
    
    <span class="kw">def</span> <span class="fn">_new_chunk</span>(<span class="var">self</span>, <span class="var">text</span>, <span class="var">level</span>, <span class="var">parent_id</span><span class="op">=</span><span class="kw">None</span>, <span class="var">**meta</span>) <span class="op">-></span> <span class="cls">HierarchicalChunk</span>:
        <span class="var">chunk</span> <span class="op">=</span> <span class="cls">HierarchicalChunk</span>(
            <span class="var">id</span><span class="op">=</span><span class="cls">str</span>(<span class="var">uuid</span>.<span class="fn">uuid4</span>()),
            <span class="var">text</span><span class="op">=</span><span class="var">text</span>.<span class="fn">strip</span>(),
            <span class="var">level</span><span class="op">=</span><span class="var">level</span>,
            <span class="var">parent_id</span><span class="op">=</span><span class="var">parent_id</span>,
            <span class="var">metadata</span><span class="op">=</span><span class="var">meta</span>
        )
        <span class="var">self</span>.<span class="var">store</span>[<span class="var">chunk</span>.<span class="var">id</span>] <span class="op">=</span> <span class="var">chunk</span>
        <span class="kw">return</span> <span class="var">chunk</span>
    
    <span class="kw">def</span> <span class="fn">chunk_markdown</span>(<span class="var">self</span>, <span class="var">text</span>: <span class="cls">str</span>, <span class="var">doc_title</span>: <span class="cls">str</span> <span class="op">=</span> <span class="str">"Document"</span>) <span class="op">-></span> <span class="cls">HierarchicalChunk</span>:
        <span class="cm"># Level 0: Document root</span>
        <span class="var">doc_chunk</span> <span class="op">=</span> <span class="var">self</span>.<span class="fn">_new_chunk</span>(<span class="var">text</span>[:<span class="num">500</span>], <span class="var">level</span><span class="op">=</span><span class="num">0</span>, <span class="var">doc_title</span><span class="op">=</span><span class="var">doc_title</span>)
        
        <span class="cm"># Level 1: Split by H1/H2 sections</span>
        <span class="var">sections</span> <span class="op">=</span> <span class="var">re</span>.<span class="fn">split</span>(<span class="str">r'(?=^#{1,2}\s)'</span>, <span class="var">text</span>, <span class="var">flags</span><span class="op">=</span><span class="var">re</span>.<span class="var">MULTILINE</span>)
        
        <span class="kw">for</span> <span class="var">section</span> <span class="kw">in</span> <span class="var">sections</span>:
            <span class="kw">if</span> <span class="kw">not</span> <span class="var">section</span>.<span class="fn">strip</span>():
                <span class="kw">continue</span>
            
            <span class="var">sec_chunk</span> <span class="op">=</span> <span class="var">self</span>.<span class="fn">_new_chunk</span>(<span class="var">section</span>, <span class="var">level</span><span class="op">=</span><span class="num">1</span>, <span class="var">parent_id</span><span class="op">=</span><span class="var">doc_chunk</span>.<span class="var">id</span>)
            <span class="var">doc_chunk</span>.<span class="var">children_ids</span>.<span class="fn">append</span>(<span class="var">sec_chunk</span>.<span class="var">id</span>)
            
            <span class="cm"># Level 2: Paragraphs within section</span>
            <span class="var">paras</span> <span class="op">=</span> <span class="var">re</span>.<span class="fn">split</span>(<span class="str">r'\n\s*\n'</span>, <span class="var">section</span>)
            <span class="kw">for</span> <span class="var">para</span> <span class="kw">in</span> <span class="var">paras</span>:
                <span class="kw">if</span> <span class="fn">len</span>(<span class="var">para</span>.<span class="fn">strip</span>()) <span class="op"><</span> <span class="var">self</span>.<span class="var">sentence_min_len</span>:
                    <span class="kw">continue</span>
                
                <span class="var">para_chunk</span> <span class="op">=</span> <span class="var">self</span>.<span class="fn">_new_chunk</span>(<span class="var">para</span>, <span class="var">level</span><span class="op">=</span><span class="num">2</span>, <span class="var">parent_id</span><span class="op">=</span><span class="var">sec_chunk</span>.<span class="var">id</span>)
                <span class="var">sec_chunk</span>.<span class="var">children_ids</span>.<span class="fn">append</span>(<span class="var">para_chunk</span>.<span class="var">id</span>)
                
                <span class="cm"># Level 3: Individual sentences</span>
                <span class="kw">import</span> <span class="var">nltk</span>
                <span class="var">sents</span> <span class="op">=</span> <span class="var">nltk</span>.<span class="fn">sent_tokenize</span>(<span class="var">para</span>)
                <span class="kw">for</span> <span class="var">sent</span> <span class="kw">in</span> <span class="var">sents</span>:
                    <span class="kw">if</span> <span class="fn">len</span>(<span class="var">sent</span>.<span class="fn">strip</span>()) <span class="op"><</span> <span class="var">self</span>.<span class="var">sentence_min_len</span>:
                        <span class="kw">continue</span>
                    <span class="var">sent_chunk</span> <span class="op">=</span> <span class="var">self</span>.<span class="fn">_new_chunk</span>(<span class="var">sent</span>, <span class="var">level</span><span class="op">=</span><span class="num">3</span>, <span class="var">parent_id</span><span class="op">=</span><span class="var">para_chunk</span>.<span class="var">id</span>)
                    <span class="var">para_chunk</span>.<span class="var">children_ids</span>.<span class="fn">append</span>(<span class="var">sent_chunk</span>.<span class="var">id</span>)
        
        <span class="kw">return</span> <span class="var">doc_chunk</span>
    
    <span class="kw">def</span> <span class="fn">get_all_at_level</span>(<span class="var">self</span>, <span class="var">level</span>: <span class="cls">int</span>) <span class="op">-></span> <span class="var">List</span>[<span class="cls">HierarchicalChunk</span>]:
        <span class="str">"Get all chunks at a specific level — useful for level-targeted search."</span>
        <span class="kw">return</span> [<span class="var">c</span> <span class="kw">for</span> <span class="var">c</span> <span class="kw">in</span> <span class="var">self</span>.<span class="var">store</span>.<span class="fn">values</span>() <span class="kw">if</span> <span class="var">c</span>.<span class="var">level</span> <span class="op">==</span> <span class="var">level</span>]`
  }
];

const navData = [
  { num:"01", name:"Fixed-Size", badge:"easy" },
  { num:"02", name:"Sentence-Based", badge:"easy" },
  { num:"03", name:"Paragraph/Section", badge:"easy" },
  { num:"04", name:"Recursive Splitting", badge:"easy" },
  { num:"05", name:"Semantic Chunking", badge:"med" },
  { num:"06", name:"Structure-Aware", badge:"med" },
  { num:"07", name:"Proposition-Based", badge:"hard" },
  { num:"08", name:"Sliding Window", badge:"easy" },
  { num:"09", name:"Small-to-Big", badge:"med" },
  { num:"10", name:"Hierarchical", badge:"hard" },
];

let current = 0;
let currentTab = 'theory';

function buildNav() {
  const list = document.getElementById('navList');
  navData.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = `nav-item${i === 0 ? ' active' : ''}`;
    el.id = `nav-${i}`;
    const badgeClass = s.badge === 'easy' ? 'badge-easy' : s.badge === 'med' ? 'badge-med' : 'badge-hard';
    el.innerHTML = `<span class="nav-num">${s.num}</span><span style="flex:1">${s.name}</span><span class="nav-badge ${badgeClass}">${s.badge === 'easy' ? 'easy' : s.badge === 'med' ? 'medium' : 'hard'}</span>`;
    el.onclick = () => navigate(i);
    list.appendChild(el);
  });
}

function renderContent(idx) {
  const s = strategies[idx];
  const main = document.getElementById('contentArea');

  const badgeLabel = s.badge === 'easy' ? 'Easy' : s.badge === 'med' ? 'Medium' : 'Hard';
  const badgeClass = s.badge === 'easy' ? 'pill-green' : s.badge === 'med' ? 'pill-amber' : 'pill-red';

  main.innerHTML = `
    <div class="strategy-header">
      <div class="strategy-icon" style="background:${s.iconBg}">${s.icon}</div>
      <div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
          <span style="font-size:11px;color:var(--muted);font-family:'JetBrains Mono',monospace">${s.num} / 10</span>
          <span class="pill ${badgeClass}">${badgeLabel}</span>
          <span class="pill pill-blue">Cost: ${s.cost}</span>
          <span class="pill pill-teal">Quality: ${s.quality}</span>
        </div>
        <div class="strategy-title">${s.name}</div>
        <div class="strategy-subtitle">${s.tagline}</div>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn${currentTab==='theory'?' active':''}" onclick="switchTab('theory')">📚 Theory</button>
      <button class="tab-btn${currentTab==='visual'?' active':''}" onclick="switchTab('visual')">👁 Visual</button>
      <button class="tab-btn${currentTab==='code'?' active':''}" onclick="switchTab('code')">💻 Code</button>
      <button class="tab-btn${currentTab==='when'?' active':''}" onclick="switchTab('when')">🎯 When to Use</button>
    </div>

    <div id="tab-theory" class="tab-panel${currentTab==='theory'?' active':''}">
      ${s.theory}
    </div>

    <div id="tab-visual" class="tab-panel${currentTab==='visual'?' active':''}">
      <div class="visual-box">${s.visual}</div>
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-label">✅ Pros</div>
          <div class="info-card-val">${s.pros.map(p=>`<span class="pill pill-green">${p}</span>`).join(' ')}</div>
        </div>
        <div class="info-card">
          <div class="info-card-label">⚠️ Cons</div>
          <div class="info-card-val">${s.cons.map(c=>`<span class="pill pill-red">${c}</span>`).join(' ')}</div>
        </div>
      </div>
    </div>

    <div id="tab-code" class="tab-panel${currentTab==='code'?' active':''}">
      <div class="code-wrap">
        <div class="code-header">
          <span class="code-title">python · ${s.name.toLowerCase().replace(/ /g,'_')}.py</span>
          <button class="copy-btn" onclick="copyCode(this)">Copy</button>
        </div>
        <pre><code>${s.code}</code></pre>
      </div>
    </div>

    <div id="tab-when" class="tab-panel${currentTab==='when'?' active':''}">
      <div class="section-block">
        <h3>✅ Use This When</h3>
        <p>${s.when}</p>
      </div>
      <div class="section-block">
        <h3>❌ Avoid When</h3>
        <p>${s.notWhen}</p>
      </div>
      <div class="section-block">
        <h3>🏭 Best Use Cases</h3>
        <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px">
          ${s.useCases.map(u=>`<span class="pill pill-blue">${u}</span>`).join('')}
        </div>
      </div>
      <div class="info-grid">
        <div class="info-card">
          <div class="info-card-label">Compute Cost</div>
          <div class="info-card-val">${s.cost}</div>
        </div>
        <div class="info-card">
          <div class="info-card-label">Retrieval Quality</div>
          <div class="info-card-val">${s.quality}</div>
        </div>
      </div>
    </div>

    <div class="nav-controls">
      ${idx > 0 ? `<button class="nav-btn nav-btn-prev" onclick="navigate(${idx-1})">← ${navData[idx-1].num} ${navData[idx-1].name}</button>` : '<span></span>'}
      ${idx < strategies.length - 1 ? `<button class="nav-btn nav-btn-next" onclick="navigate(${idx+1})">${navData[idx+1].num} ${navData[idx+1].name} →</button>` : `<button class="nav-btn nav-btn-next" style="background:var(--green);border-color:var(--green)">🎉 All 10 Complete!</button>`}
    </div>
  `;
}

function switchTab(tab) {
  currentTab = tab;
  renderContent(current);
  document.getElementById('main').scrollTop = 0;
}

function navigate(idx) {
  document.getElementById(`nav-${current}`)?.classList.remove('active');
  current = idx;
  document.getElementById(`nav-${current}`)?.classList.add('active');
  renderContent(current);
  document.getElementById('main').scrollTop = 0;
  // Update progress bar
  const pct = Math.round(((current + 1) / strategies.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  // Scroll nav into view
  document.getElementById(`nav-${current}`)?.scrollIntoView({ block: 'nearest' });
}

function copyCode(btn) {
  const code = btn.closest('.code-wrap').querySelector('pre code');
  const text = code.innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
}

buildNav();
renderContent(0);
</script>
</body>
</html>
